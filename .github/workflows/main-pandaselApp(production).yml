name: Build and deploy JAR app to Azure Web App - pandaselApp

on:
  push:
    branches:
      - main
    # frontend 폴더의 변경사항만 있을 때는 워크플로우를 실행하지 않음
    paths-ignore:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      # 1. Gradle 래퍼(gradlew)에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 2. Gradle을 사용하여 빌드 (DB 연결 에러 방지를 위해 테스트 스킵)
      - name: Build with Gradle
        run: ./gradlew build -x test 

      # 3. ⭐️ [에러 박멸 핵심] plain.jar 파일을 삭제하여 배포 충돌을 원천 차단
      - name: Remove plain jar to prevent deployment confusion
        run: rm build/libs/*-plain.jar

      # 4. 이제 하나만 남은 진짜 실행 가능한 .jar 파일만 안전하게 업로드
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/build/libs/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 5. 최종 배포 (내려받은 단일 .jar 파일을 그대로 밀어넣음)
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pandaselApp'
          slot-name: 'Production'
          package: '*.jar'
